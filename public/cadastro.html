<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pkmnHub | Cadastro</title>
    <link rel="icon" href="./assets/imgs/main/logo.png">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="bodyCadastro2">
    <main class="cadastroContainer">
        <section class="formularioCadastro">
            <div class="logo">
                <a href="index.html">
                    <img src="./assets/imgs/main/logo.png">pkmnHub</a>
            </div>

            <div class="welcome-text">
                <h1>Comece sua Jornada</h1>
                <p>Escolha seu inicial!</p>
            </div>

            <form onsubmit="return false;">
                <label>USERNAME</label>
                <input type="text" id="ipt_username" placeholder="Ex: Red1996">

                <label>E-MAIL</label>
                <input type="text" id="ipt_email" placeholder="nome@exemplo.com">

                <div class="inputsJuntos">
                    <div class="espaco">
                        <label>SENHA</label>
                        <input type="password" id="ipt_senha" placeholder="********">
                    </div>
                    <div class="espaco">
                        <label>CONFIRMAR SENHA</label>
                        <input type="password" id="ipt_confirmacaoSenha" placeholder="********">
                    </div>
                </div>

                <label class="labelRadio">ESCOLHA SUA FOTO DE PERFIL</label>
                <div class="fotoPerfil-selector">
                    <label class="fotoPerfil-item"><input type="radio" name="n_fotoPerfil" value="1"><img
                            src="./assets/imgs/profilePics/1.webp"></label>
                    <label class="fotoPerfil-item"><input type="radio" name="n_fotoPerfil" value="2"><img
                            src="./assets/imgs/profilePics/2.webp"></label>
                    <label class="fotoPerfil-item"><input type="radio" name="n_fotoPerfil" value="3"><img
                            src="./assets/imgs/profilePics/3.webp"></label>
                    <label class="fotoPerfil-item"><input type="radio" name="n_fotoPerfil" value="4"><img
                            src="./assets/imgs/profilePics/4.webp"></label>
                    <label class="fotoPerfil-item"><input type="radio" name="n_fotoPerfil" value="5"><img
                            src="./assets/imgs/profilePics/5.webp"></label>
                    <label class="fotoPerfil-item"><input type="radio" name="n_fotoPerfil" value="6"><img
                            src="./assets/imgs/profilePics/6.webp"></label>
                </div>

                <label id="div_validacao"></label>

                <button class="btnPrincipal_sign" onclick="cadastrar()">Cadastrar</button>
            </form>

            <p class="linkCadastro">Já possui uma conta? <a href="login.html">Entrar</a></p>
        </section>

        <section class="direitaContainer">
            <div class="direitaConteudo">
                <div class="detalheCadastro">
                    <span class="detalheCadastro01">ACESSO ILIMITADO</span>
                    <span class="detalheCadastro02">GESTÃO PREMIUM</span>
                </div>
                <h2>Domine o jogo, <span class="destaqueTexto">Colecione</span> lendas!</h2>

                <div class="footerDireita">
                    <div class="footerDireita_item">
                        <strong>1k+</strong>
                        <p>POKÉMONS</p>
                    </div>
                    <div class="divider"></div>
                    <div class="footerDireita_item">
                        <strong>TODAS</strong>
                        <p>AS SUAS CARTAS</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>

<script>
    function cadastrar() {
        // ----- VARIAVEIS INPUTS: -----
        let username = ipt_username.value;
        let email = ipt_email.value;
        let senha = ipt_senha.value;
        let confirmacao = ipt_confirmacaoSenha.value;

        let numFotoPerfil = document.querySelector('input[name="n_fotoPerfil"]:checked')?.value;

        // ----- VALIDAÇÕES: -----
        let condicoesErro = [
            username == "" || email == "" || senha == "" || confirmacao == "",
            username.length <= 3,
            !email.includes("@") || !email.includes("."),
            senha.length < 6,
            confirmacao != senha,
            numFotoPerfil == undefined
        ];


        let mensagensErro = [
            "Preencha todos os campos para começar sua jornada!",
            "Seu nome de treinador deve ter mais de 3 caracteres.",
            "Insira um e-mail válido (ex: treinador@pkmn.com).",
            "Sua senha deve ter no mínimo 6 caracteres.",
            "As senhas digitadas não coincidem.",
            "Escolha uma personagem para sua foto de perfil!"
        ];

        div_validacao.innerHTML = "";

        for (let i = 0; i < condicoesErro.length; i++) {
            if (condicoesErro[i]) {
                div_validacao.innerHTML = '<span style="color: #EE3D2D">' + mensagensErro[i] + '</span>';
                return false;
            }
        }

        // ----- IMPLEMENTAÇÃO API: -----
    }
</script>
