<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pkmnHub | Dashboard</title>
    <link rel="icon" href="../assets/imgs/main/logo.png">
    <link rel="stylesheet" href="../css/style_dashboard.css">
</head>

<body onload="buscarKpis()">
    <aside class="sidebar">
        <div class="logo">
            <a href="../index.html"><img src="../assets/imgs/main/logo2.png">pkmnHub</a>
        </div>

        <nav class="nav-menu">
            <ul>
                <li class="nav-item"><a href="../index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="dashboard_colecao.html" class="nav-link">Coleção</a></li>
                <li class="nav-item"><a href="dashboard_binders.html" class="nav-link">Binders</a></li>
                <li class="nav-item active"><a href="dashboard_business.html" class="nav-link">Business</a></li>
                <li class="nav-item nav-item-has-submenu" id="cadastroMenu">
                    <a class="nav-link">Cadastro</a>
                    <ul class="submenu">
                        <li><a href="dashboard_compra.html" class="submenu-link">Compra</a></li>
                        <li><a href="dashboard_venda.html" class="submenu-link">Venda</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </aside>

    <div class="main-container">
        <header id="header">
            <!-- Bloco da Esquerda (Início) -->
            <div class="header-left">
                <div class="header-search-group">
                </div>
            </div>

            <!-- Bloco da Direita (Fim) -->
            <div class="header-right">
                <span class="user-welcome">hey! <span id="username"></span></span>
            </div>
        </header>

        <div class="dashboard-flex-wrapper">
            <div class="col-left">
                <div class="card chart-main-card">
                    <div class="label">Valor estimado da coleção</div>
                    <div class="main-value" id="valorTotalColecao"></div>

                    <div class="chart-filters">
                        <button class="btn-filter active" onclick="buscarKpis('30 DAY', this)">30 Dias</button>
                        <button class="btn-filter active" onclick="buscarKpis('3 MONTH', this)">3 Meses</button>
                        <button class="btn-filter active" onclick="buscarKpis('6 MONTH', this)">6 Meses</button>
                        <button class="btn-filter active" onclick="buscarKpis('1 YEAR', this)">1 Ano</button>
                    </div>

                    <div class="chart-wrapper">
                        <canvas id="myChart"></canvas>
                    </div>
                </div>

                <div class="card chart-main-card chart-main-card--compact">
                    <div class="label">COMPARATIVO (TOTAL)</div>
                    <div class="card card--canvas">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-right">
                <div class="card total-cards">
                    <div class="label">Total de cartas</div>
                    <div class="total-group-right">
                        <span class="total-number" id="totalCartas"></span>
                        <span class="label">Total</span>
                    </div>
                </div>

                <div class="card most-expensive">
                    <div class="most-expensive-content">
                        <div>
                            <div class="label">Carta mais cara</div>
                            <div class="carta-mais-cara-nome" id="cartaMaisCara"></div>
                        </div>
                        <div class="carta-mais-cara-valor" id="cartaMaisCaraValor"></div>
                    </div>
                    <div class="card-img-wrapper" id="cartaMaisCaraImg"></div>
                </div>

                <div class="row-inner">
                    <div class="card gasto-card">
                        <div class="label">Gasto</div>
                        <div class="kpi-valor" id="totalGasto"></div>
                    </div>
                    <div class="card retorno-card">
                        <div class="label">Retorno</div>
                        <div class="kpi-valor" id="totalRetorno"></div>
                    </div>
                </div>

                <div class="row-inner">
                    <div class="card chart-main-card chart-main-card--compact-wide">
                        <div class="label">COMPARATIVO (COLEÇÕES)</div>
                        <div class="card card--canvas">
                            <canvas id="meuGraficoRosca"></canvas>
                        </div>
                    </div>

                    <div class="row-inner row-inner--column">
                        <div class="card card--kpi-small">
                            <div class="label">ROI</div>
                            <div class="roi-value" id="roi"></div>
                        </div>

                        <div class="card card--action-center">
                            <button class="btn-legend" onclick="toggleLegenda(meuGraficoRosca)">EXIBIR LEGENDA</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/dados.js"></script>
<script src="../js/functions.js"></script>

<script>
    let meuGraficoLinhas = null;
    let meuGraficoBarras = null;
    let meuGraficoRosca = null;

    function buscarKpis(intervalo = '30 DAY', botao) {
        document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
        if (botao) botao.classList.add('active');

        let usuario = sessionStorage.getItem("ID_USER");

        fetch(`/kpis/buscarKpis?usuarioServer=${usuario}&intervaloServer=${intervalo}`)
            .then(function (resposta) {
                return resposta.json();
            })
            .then(function (json) {
                    valorTotalColecao.innerHTML = formatarBrl(json.valorTotalColecao[0].valor_total_colecao),
                    totalCartas.innerHTML = json.totalCartas[0].total_cartas_fisicas,
                    cartaMaisCara.innerHTML = json.cartaMaisCara[0].nome_pokemon + " - " + json.cartaMaisCara[0].set_nome,
                    document.getElementById("cartaMaisCaraImg").style.backgroundImage = `url(${json.cartaMaisCara[0].url_imagem})`;
                    cartaMaisCaraValor.innerHTML = formatarBrl(json.cartaMaisCara[0].preco_ligaPkmn),
                    totalGasto.innerHTML = formatarBrl(json.totalGasto[0].total_investido),
                    totalRetorno.innerHTML = formatarBrl(json.totalRetorno[0].total_retorno),
                    roi.innerHTML = ((json.totalRetorno[0].total_retorno - json.totalGasto[0].total_investido) / json.totalGasto[0].total_investido * 100).toFixed(0) + "%";

                // ----- GRÁFICO DE LINHA -----
                let labelsLinha = json.evolucaoColecao.map(item =>
                    new Date(item.data_snapshot).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' })
                );
                let dadoslinha = json.evolucaoColecao.map(item => item.valor_total);

                if (meuGraficoLinhas) meuGraficoLinhas.destroy();

                const ctx = document.getElementById('myChart').getContext('2d');
                meuGraficoLinhas = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labelsLinha,
                        datasets: [{
                            label: 'Valor da Coleção',
                            data: dadoslinha,
                            borderColor: '#F9CF30',
                            tension: 0.5,
                            pointRadius: 0,
                            pointHoverRadius: 5,
                            borderWidth: 3
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                                align: 'end',
                                labels: { color: '#808fa5', usePointStyle: false, boxWidth: 4, boxHeight: 4 }
                            }
                        },
                        scales: {
                            x: { ticks: { color: '#808fa5' }, grid: { color: 'rgba(255,255,255,0.08)' } },
                            y: {
                                ticks: {
                                    color: '#808fa5',
                                    callback: function (value) { return 'R$ ' + value.toLocaleString('pt-BR'); }
                                },
                                grid: { color: 'rgba(255,255,255,0.08)' }
                            }
                        }
                    }
                });

                // ----- GRÁFICO DE BARRAS -----
                let valorLiga = json.valorTotalColecao[0].valor_total_colecao;
                let valorCompra = json.valorTotalCompra[0].valor_total_compra;

                if (meuGraficoBarras) meuGraficoBarras.destroy();

                const ctxBar = document.getElementById('barChart').getContext('2d');
                meuGraficoBarras = new Chart(ctxBar, {
                    type: 'bar',
                    data: {
                        labels: ['VALOR REAL', 'VALOR DE COMPRA'],
                        datasets: [{ data: [valorLiga, valorCompra], backgroundColor: '#F9CF30', barThickness: 20 }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { ticks: { color: '#808fa5' }, grid: { color: 'rgba(255,255,255,0.08)' } },
                            y: { ticks: { color: '#808fa5' }, grid: { color: 'rgba(255,255,255,0.08)' } }
                        }
                    }
                });

                // ----- GRÁFICO DE ROSCA -----
                let labelsRosca = json.valorPorSet.map(item => {
                    let set = sets.find(s => s.nomePt === item.set_nome || s.nomeEn === item.set_nome);
                    return set ? set.sigla : item.set_nome;
                });
                let dadosRosca = json.valorPorSet.map(item => item.total_valor);
                let coresRosca = json.valorPorSet.map(item => {
                    let set = sets.find(s => s.nomePt === item.set_nome || s.nomeEn === item.set_nome);
                    return set ? set.cor : '#808fa5';
                });

                if (meuGraficoRosca) meuGraficoRosca.destroy();

                const ctxRosca = document.getElementById('meuGraficoRosca').getContext('2d');
                meuGraficoRosca = new Chart(ctxRosca, {
                    type: 'doughnut',
                    data: {
                        labels: labelsRosca,
                        datasets: [{ data: dadosRosca, backgroundColor: coresRosca, borderWidth: 0, hoverOffset: 5 }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        layout: { padding: 5 },
                        plugins: {
                            legend: {
                                position: 'right',
                                display: false,
                                labels: { color: '#808fa5', font: { size: 9 }, boxWidth: 9, padding: 10 }
                            },
                            tooltip: {
                                callbacks: {
                                    label: function (context) {
                                        let sigla = context.label;
                                        let set = sets.find(s => s.sigla === sigla);
                                        let nomeCompleto = set ? set.nomePt : sigla;
                                        let valor = formatarBrl(context.parsed);
                                        return `${nomeCompleto}: ${valor}`;
                                    }
                                }
                            },
                            datalabels: { display: true }
                        },
                        cutout: '65%'
                    }
                });
            })
            .catch(function (erro) {
                console.log(erro);
            });
    }
</script>
