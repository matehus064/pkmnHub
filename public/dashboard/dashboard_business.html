<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pkmnHub | Dashboard</title>
    <link rel="icon" href="../assets/imgs/main/logo.png">
    <link rel="stylesheet" href="../css/style_dashboard.css">
</head>

<body onload="buscarKpis()">
    <aside class="sidebar">
        <div class="logo">
            <a href="../index.html"><img src="../assets/imgs/main/logo2.png">pkmnHub</a>
        </div>

        <nav class="nav-menu">
            <ul>
                <li class="nav-item"><a href="../index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="dashboard_colecao.html" class="nav-link">Coleção</a></li>
                <li class="nav-item active"><a href="dashboard_business.html" class="nav-link">Business</a></li>
                <li class="nav-item nav-item-has-submenu" id="cadastroMenu">
                    <a class="nav-link">Cadastro</a>
                    <ul class="submenu">
                        <li><a href="dashboard_compra.html" class="submenu-link">Compra</a></li>
                        <li><a href="dashboard_venda.html" class="submenu-link">Venda</a></li>
                        <li><a href="dashboard_troca.html" class="submenu-link">Troca</a></li>
                        <li><a href="colecao.html" class="submenu-link">Colecao</a></li>
                        <li><a href="#" class="submenu-link">Atualização</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- CONTEÚDO -->
    <div class="main-container">
        <header id="header">
            <span style="font-weight: 100;">hey! <span style="font-weight: 900;" id="username"></span ></span>
        </header>

        <div class="dashboard-flex-wrapper">
            <div class="col-left">
                <div class="card chart-main-card">
                    <div class="label">Valor estimado da coleção</div>
                    <div class="main-value" id="valorTotalColecao"></div>

                    <div class="chart-filters">
                        <button class="btn-filter active" onclick="buscarKpis('30 DAY', this)">30 Dias</button>
                        <button class="btn-filter active" onclick="buscarKpis('3 MONTH', this)">3 Meses</button>
                        <button class="btn-filter active" onclick="buscarKpis('6 MONTH', this)">6 Meses</button>
                        <button class="btn-filter active" onclick="buscarKpis('1 YEAR', this)">1 Ano</button>
                    </div>

                    <div class="chart-wrapper">
                        <canvas id="myChart"></canvas>
                    </div>
                </div>

                <div class="card" style="height: 160px;">
                    <canvas id="barChart"></canvas>
                </div>
            </div>

            <div class="col-right">
                <div class="card total-cards">
                    <div class="label">Total de cartas</div>
                    <div class="total-group-right">
                        <span class="total-number" id="totalCartas"></span>
                        <span class="label">Total</span>
                    </div>
                </div>

                <div class="card most-expensive">
                    <div style="display: flex; flex-direction: column; justify-content: space-between;">
                        <div>
                            <div class="label">Carta mais cara</div>
                            <div style="color: var(--text-gray); font-size: 13px; margin-top: 5px;" id="cartaMaisCara"></div>
                        </div>
                        <div style="font-size: 30px; font-weight: 700;" id="cartaMaisCaraValor"></div>
                    </div>
                    <img src="" class="card-img" id="cartaMaisCaraImg">
                </div>

                <div class="row-inner">
                    <div class="card gasto-card">
                        <div class="label">Gasto</div>
                        <div style="font-size: 28px; font-weight: 700; margin-top: 10px;" id="totalGasto"></div>
                    </div>
                    <div class="card retorno-card">
                        <div class="label">Retorno</div>
                        <div style="font-size: 28px; font-weight: 700; margin-top: 10px;" id="totalRetorno"></div>
                    </div>
                </div>

                <div class="row-inner">
                    <div class="card" style="flex:1;">
                        <div class="label">ROI</div>
                        <div class="roi-value" id="roi"></div>
                    </div>
                    <div class="card" style="flex:1; opacity: 0.3;"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // LÓGICA DA BANDEJA (SIDEBAR)
    document.addEventListener('DOMContentLoaded', function () {
        const cadastroMenu = document.getElementById('cadastroMenu');
        const linkCadastro = cadastroMenu.querySelector('.nav-link');

        linkCadastro.addEventListener('click', function (e) {
            e.preventDefault();
            cadastroMenu.classList.toggle('open');
        });
    });

    // ----- INFORMAÇÕES DO USER: -----
    let username = sessionStorage.getItem("USERNAME");
    document.getElementById("username").innerHTML = username;
    let numeroImagem = sessionStorage.getItem("PROFILE_PIC");
    header.innerHTML += '<img src="../assets/imgs/profilePics/' + numeroImagem + '.webp" class="user-avatar">';

    // ----- ALGORITIMO SÓ PRA FORMATAR OS NÚMEROS: -----
    function formatarBrl(valor) {
        if (valor == null) return "R$ 0,00";

        let v = Number(valor).toFixed(2);

        if (v.length >= 7) {
            let parte1 = v.substring(0, 1);
            let parte2 = v.substring(1, v.indexOf('.'));
            let centavos = v.substring(v.indexOf('.') + 1);

            v = parte1 + "." + parte2 + "," + centavos;
        } else {
            v = v.replace(".", ",");
        }

        return "R$ " + v;
    }

    // ----- IMPLEMENTAÇÃO API (KPIS): -----
    let meuGraficoLinhas = null; // ← declara fora da função
    let meuGraficoBarras = null;

    function buscarKpis(intervalo = '30 DAY', botao) {
        // remove active de todos
        document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
        // adiciona active no botão clicado
        if (botao) botao.classList.add('active');

        let usuario = sessionStorage.getItem("ID_USER");

        fetch(`/kpis/buscarKpis?usuarioServer=${usuario}&intervaloServer=${intervalo}`)
            .then(function (resposta) {
                return resposta.json();
            })
            .then(function (json) {

                valorTotalColecao.innerHTML = formatarBrl(json.valorTotalColecao[0].valor_total_colecao),
                    totalCartas.innerHTML = json.totalCartas[0].total_cartas_fisicas,
                    cartaMaisCara.innerHTML = json.cartaMaisCara[0].nome_pokemon + " - " + json.cartaMaisCara[0].set_nome,
                    cartaMaisCaraImg.src = json.cartaMaisCara[0].url_imagem,
                    cartaMaisCaraValor.innerHTML = formatarBrl(json.cartaMaisCara[0].preco_ligaPkmn),
                    totalGasto.innerHTML = formatarBrl(json.totalGasto[0].total_investido),
                    totalRetorno.innerHTML = formatarBrl(json.totalRetorno[0].total_retorno),
                    roi.innerHTML = ((json.totalRetorno[0].total_retorno - json.totalGasto[0].total_investido) / json.totalGasto[0].total_investido * 100).toFixed(0) + "%";

                // ----- GRÁFICO DE LINHA: -----
                let labelsLinha = json.evolucaoColecao.map(item =>
                    new Date(item.data_snapshot).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' })
                );
                let dadoslinha = json.evolucaoColecao.map(item => item.valor_total);

                if (meuGraficoLinhas) {
                    meuGraficoLinhas.destroy();
                }

                const ctx = document.getElementById('myChart').getContext('2d');
                meuGraficoLinhas = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labelsLinha,
                        datasets: [{
                            label: 'Valor da Coleção',
                            data: dadoslinha,
                            borderColor: '#f5da55',
                            tension: 0.5,
                            pointRadius: 0,
                            pointHoverRadius: 5,
                            borderWidth: 3
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false
                        },
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                                align: 'end',
                                labels: {
                                    color: '#888',
                                    usePointStyle: false,
                                    boxWidth: 4,
                                    boxHeight: 4
                                }
                            }
                        },
                        scales: {
                            x: {
                                ticks: { color: '#888' },
                                grid: { color: 'rgba(255,255,255,0.08)' }
                            },
                            y: {
                                ticks: {
                                    color: '#888',
                                    callback: function (value) {
                                        return 'R$ ' + value.toLocaleString('pt-BR');
                                    }
                                },
                                grid: { color: 'rgba(255,255,255,0.08)' }
                            }
                        }
                    }
                });

                // ----- GRÁFICO DE BARRAS: -----
                let valorLiga = json.valorTotalColecao[0].valor_total_colecao;
                let valorCompra = json.valorTotalCompra[0].valor_total_compra;

                if (meuGraficoBarras) {
                    meuGraficoBarras.destroy();
                }

                const ctxBar = document.getElementById('barChart').getContext('2d');
                meuGraficoBarras = new Chart(ctxBar, {
                    type: 'bar',
                    data: {
                        labels: ['VALOR REAL', 'VALOR DE COMPRA'],
                        datasets: [{
                            data: [valorLiga, valorCompra],
                            backgroundColor: '#f5da55',
                            barThickness: 20
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: {
                                ticks: { color: '#555' },
                                grid: { color: 'rgba(255,255,255,0.08)' }  // ← muda display:false para cor
                            },
                            y: {
                                ticks: { color: '#555' },
                                grid: { color: 'rgba(255,255,255,0.08)' }
                            }
                        }
                    }
                })
            })

            .catch(function (erro) {
                console.log(erro);
            })
    }
</script>
