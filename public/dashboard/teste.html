<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>


    <div id="blablacar">
        <input type="text" id="set" placeholder="set">
        <input type="text" id="num" oninput="validandoImagem()">
        <img src="" alt="" id="imagem" style="width: 100px;">

    </div>
</body>

</html>

<script>
    function validandoImagem() {
        let numeroIpt = num.value;
        let setIpt = set.value;
        let makerSet = "";

        let makerNum = Number(numeroIpt.substring(0, 3));

        let sets = ['escarlate e violeta', 'evoluções em paldea ', 'obsidiana em chamas', '151', 'fenda paradoxal', 'destinos de paldea', 'forças temporais', 'máscaras do crepúsculo', 'fábulas nebulosas', 'coroa estelar', 'fagulhas impetuosas', 'prismatic', 'amigos de jornada', 'rivais predestinados', 'white flare', 'black bolt', 'promo'];
        let apiSets = ['sv1', 'sv2', 'sv3', 'sv3pt5', 'sv4', 'sv4pt5', 'sv5', 'sv6', 'sv6pt5', 'sv7', 'sv8', 'sv8pt5', 'sv9', 'sv10', 'rsv10pt5', 'zsv10pt5', 'svp'];
        for (let i = 0; i < sets.length; i++) {
            if (setIpt == sets[i]) {
                makerSet = apiSets[i];
                break;
            }
        }

        imagem.src = 'https://images.pokemontcg.io/' + makerSet + '/' + makerNum + '_hires.png'

    }


</script>
