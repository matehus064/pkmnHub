<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pkmnHub | Binder</title>
    <link rel="icon" href="../assets/imgs/main/logo.png">
    <link rel="stylesheet" href="../css/style_dashboard.css">
</head>

<style>
    /* ========== RESET PARA PÁGINA PÚBLICA (sem sidebar) ========== */
    body {
        display: block;
        height: 100vh;
        overflow: hidden;
    }

    /* ========== TOPBAR PÚBLICA ========== */
    .pub-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 40px;
        border-bottom: 1px solid var(--border-dark);
        flex-shrink: 0;
    }

    .pub-logo {
        font-size: 20px;
        font-weight: 800;
        color: var(--accent-yellow);
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
    }

    .pub-logo img {
        width: 22px;
    }

    .pub-logo span {
        color: white;
    }

    .pub-dono {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-gray);
        font-size: 13px;
        font-weight: 600;
    }

    .pub-dono-nome {
        color: white;
        font-weight: 800;
    }

    .pub-badge-readonly {
        font-size: 10px;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 20px;
        background: rgba(49, 167, 215, 0.12);
        color: #31A7D7;
    }

    /* ========== WRAPPER PRINCIPAL ========== */
    .pub-wrapper {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 65px);
        padding: 20px 40px 30px 40px;
        gap: 14px;
    }

    /* ========== BINDER INFO ========== */
    .pub-binder-info {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
    }

    .pub-binder-titulo {
        font-size: 20px;
        font-weight: 800;
    }

    /* ========== BINDER AREA (igual ao binder_view) ========== */
    .binder-area {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
        background: var(--bg-card);
        border: 1px solid var(--border-dark);
        border-radius: 20px;
        overflow: hidden;
        padding: 20px 60px;
        position: relative;
    }

    .binder-page {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
    }

    .binder-page-blank {
        flex: 1;
        height: 100%;
    }

    .binder-spine {
        width: 8px;
        flex-shrink: 0;
        background: var(--border-dark);
        border-radius: 3px;
        align-self: stretch;
        margin: 0 10px;
    }

    .binder-page-grid {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .binder-page-row {
        display: flex;
        flex-direction: row;
        gap: 8px;
    }

    /* ========== SLOTS (somente leitura — sem hover de ação) ========== */
    .binder-slot {
        background: #0e1013;
        border: 1px solid var(--border-dark);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
        flex-shrink: 0;
    }

    .slot-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        width: 100%;
        height: 100%;
    }

    .slot-label {
        color: var(--text-gray);
        font-size: 10px;
        font-weight: 700;
    }

    .slot-num {
        color: white;
        font-size: 13px;
        font-weight: 800;
    }

    .slot-card-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        border-radius: 7px;
        cursor: pointer;
        transition: transform 0.2s;
    }

    .slot-card-img:hover {
        transform: scale(1.03);
    }

    .nao-obtida {
        opacity: 0.4;
        filter: grayscale(80%);
    }

    /* ========== NAVEGAÇÃO ========== */
    .btn-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 22px;
        font-weight: 800;
        cursor: pointer;
        font-family: 'Manrope', sans-serif;
        transition: opacity 0.2s;
        z-index: 10;
        line-height: 1;
    }

    .btn-nav:hover { opacity: 0.85; }

    .btn-nav:disabled {
        color: var(--text-gray);
        cursor: default;
        opacity: 1;
    }

    #btn-prev { left: 10px; }
    #btn-next { right: 10px; }

    .nav-page-info {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        color: var(--text-gray);
        font-size: 13px;
        font-weight: 700;
        pointer-events: none;
    }

    /* ========== MODAL DE IMAGEM AMPLIADA ========== */
    .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }

    .modal-image-container {
        position: relative;
        max-width: 90vw;
        max-height: 90vh;
        display: flex;
        justify-content: center;
        align-items: center;
        animation: modalEntrar 0.2s ease;
    }

    .modal-image-container img {
        max-width: 100%;
        max-height: 90vh;
        border-radius: 15px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
        object-fit: contain;
    }

    @keyframes modalEntrar {
        from { opacity: 0; transform: scale(0.96) translateY(8px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-close-img {
        position: absolute;
        top: -40px;
        right: 0;
        background: none;
        border: none;
        color: white;
        font-size: 26px;
        cursor: pointer;
        font-family: 'Manrope', sans-serif;
        transition: color 0.2s;
    }

    .modal-close-img:hover { color: var(--text-gray); }

    /* ========== ESTADO DE ERRO ========== */
    .pub-erro {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 12px;
        color: var(--text-gray);
    }

    .pub-erro-titulo {
        font-size: 22px;
        font-weight: 800;
        color: white;
    }
</style>

<body>

    <!-- Topbar pública -->
    <div class="pub-topbar">
        <a class="pub-logo" href="../index.html">
            <img src="../assets/imgs/main/logo2.png">pkmn<span>Hub</span>
        </a>

        <div class="pub-dono">
            Binder de <span class="pub-dono-nome" id="pub-dono-nome">...</span>
            <span class="pub-badge-readonly">Somente leitura</span>
        </div>
    </div>

    <!-- Conteúdo principal -->
    <div class="pub-wrapper" id="pub-wrapper">

        <div class="pub-binder-info">
            <span class="pub-binder-titulo" id="binder-titulo">Carregando...</span>
            <span class="binder-badge" id="binder-tipo-badge">--</span>
        </div>

        <div class="binder-area" id="binder-area">
            <button class="btn-nav" id="btn-prev" onclick="navegarPagina(-1)">‹</button>
            <div class="binder-page" id="lado-esquerdo"></div>
            <div class="binder-spine"></div>
            <div class="binder-page" id="lado-direito"></div>
            <button class="btn-nav" id="btn-next" onclick="navegarPagina(1)">›</button>
            <span class="nav-page-info" id="nav-info">1</span>
        </div>

    </div>

    <!-- Modal de imagem ampliada -->
    <div id="modal_imagem" class="modal-backdrop" style="display:none;">
        <div class="modal-image-container">
            <button class="modal-close-img" onclick="fecharModalImagem()">✕</button>
            <img id="img_ampliada" src="" alt="Carta Ampliada">
        </div>
    </div>

</body>
</html>

<script>
    /* ══════════════════════════════
       VARIÁVEIS GLOBAIS
    ══════════════════════════════ */
    let CONFIG_TIPO = {
        '2x2': { cols: 2, rows: 2, totalSlots: 160 },
        '3x3': { cols: 3, rows: 3, totalSlots: 360 },
        '4x3': { cols: 4, rows: 3, totalSlots: 480 },
    };

    let binderAtual = {
        tipo:   '3x3',
        cartas: {}
    };

    let paginaAtual = 0;

    /* ══════════════════════════════
       1. CARREGAR BINDER PÚBLICO
    ══════════════════════════════ */
    function carregarBinderPublico() {
        let partes = window.location.pathname.split('/');
        let token  = partes[partes.length - 1];

        if (!token) {
            mostrarErro("Link inválido.");
            return;
        }

        fetch('/binder/publico/' + token)
            .then(function(resposta) {
                if (!resposta.ok) throw new Error("Binder não encontrado.");
                return resposta.json();
            })
            .then(function(json) {
                /*
                    Estrutura esperada da API:
                    {
                        nome:   "Meu Binder",
                        tipo:   "3x3",
                        dono:   "NomeDoUsuario",
                        slots:  [ { slot, url_imagem, obtida }, ... ]
                    }
                */
                binderAtual.tipo   = json.tipo;
                binderAtual.cartas = {};

                for (let i = 0; i < json.slots.length; i++) {
                    let linha          = json.slots[i];
                    let slotIndexFront = linha.slot - 1;
                    binderAtual.cartas[slotIndexFront] = {
                        img:    linha.url_imagem,
                        obtida: linha.obtida
                    };
                }

                document.getElementById("binder-titulo").textContent     = json.nome;
                document.getElementById("binder-tipo-badge").textContent = json.tipo;
                document.getElementById("pub-dono-nome").textContent     = json.dono;
                document.title = 'pkmnHub | ' + json.nome + ' — ' + json.dono;

                renderizarPagina();
            })
            .catch(function(erro) {
                console.error(erro);
                mostrarErro("Binder não encontrado ou link expirado.");
            });
    }

    function mostrarErro(mensagem) {
        let wrapper = document.getElementById("pub-wrapper");
        wrapper.innerHTML =
            '<div class="pub-erro">' +
                '<span class="pub-erro-titulo">Ops!</span>' +
                '<span>' + mensagem + '</span>' +
            '</div>';
    }

    /* ══════════════════════════════
       2. LAYOUT E RENDERIZAÇÃO
    ══════════════════════════════ */
    function calcularTamanhoSlot(cfg) {
        let area       = document.getElementById("binder-area");
        let gap        = 8;
        let padArea    = 40;
        let spine      = 28;

        let alturaDisp  = area.clientHeight - padArea;
        let larguraDisp = (area.clientWidth - padArea - spine) / 2;

        let slotH = Math.floor((alturaDisp  - (cfg.rows - 1) * gap) / cfg.rows);
        let slotW = Math.floor(slotH * 5 / 7);

        let maxSlotW = Math.floor((larguraDisp - (cfg.cols - 1) * gap) / cfg.cols);
        if (slotW > maxSlotW) {
            slotW = maxSlotW;
            slotH = Math.floor(slotW * 7 / 5);
        }

        return { w: slotW, h: slotH };
    }

    function gerarSlotHTML(slotIndex, w, h) {
        let carta = binderAtual.cartas[slotIndex];
        let num   = slotIndex + 1;
        let style = 'width:' + w + 'px;height:' + h + 'px;';

        if (carta && carta.img) {
            let classeImg = carta.obtida == 0 ? 'slot-card-img nao-obtida' : 'slot-card-img';
            return '<div class="binder-slot" style="' + style + '">' +
                       '<img class="' + classeImg + '" src="' + carta.img + '" onclick="abrirModalImagem(\'' + carta.img + '\')">' +
                   '</div>';
        }

        return '<div class="binder-slot" style="' + style + '">' +
                   '<div class="slot-empty">' +
                       '<span class="slot-label">Slot</span>' +
                       '<span class="slot-num">#' + num + '</span>' +
                   '</div>' +
               '</div>';
    }

    function gerarPaginaHTML(cfg, offset, tam) {
        let html  = '<div class="binder-page-grid">';
        let total = CONFIG_TIPO[binderAtual.tipo].totalSlots;

        for (let r = 0; r < cfg.rows; r++) {
            html += '<div class="binder-page-row">';
            for (let c = 0; c < cfg.cols; c++) {
                let slotIndex = offset + (r * cfg.cols + c);
                if (slotIndex >= total) break;
                html += gerarSlotHTML(slotIndex, tam.w, tam.h);
            }
            html += '</div>';
        }

        html += '</div>';
        return html;
    }

    function renderizarPagina() {
        let cfg          = CONFIG_TIPO[binderAtual.tipo];
        let totalPaginas = calcularTotalPaginas();
        let slotsPorPag  = cfg.cols * cfg.rows;
        let tam          = calcularTamanhoSlot(cfg);

        let ladoEsq = document.getElementById("lado-esquerdo");
        let ladoDir = document.getElementById("lado-direito");

        if (paginaAtual === 0) {
            ladoEsq.className = 'binder-page-blank';
            ladoEsq.innerHTML = '';
            ladoDir.className = 'binder-page';
            ladoDir.innerHTML = gerarPaginaHTML(cfg, 0, tam);

        } else if (paginaAtual === totalPaginas - 1) {
            let offsetEsq     = (paginaAtual * 2 - 1) * slotsPorPag;
            ladoEsq.className = 'binder-page';
            ladoEsq.innerHTML = gerarPaginaHTML(cfg, offsetEsq, tam);
            ladoDir.className = 'binder-page-blank';
            ladoDir.innerHTML = '';

        } else {
            let offsetEsq     = (paginaAtual * 2 - 1) * slotsPorPag;
            let offsetDir     = paginaAtual * 2 * slotsPorPag;
            ladoEsq.className = 'binder-page';
            ladoDir.className = 'binder-page';
            ladoEsq.innerHTML = gerarPaginaHTML(cfg, offsetEsq, tam);
            ladoDir.innerHTML = gerarPaginaHTML(cfg, offsetDir, tam);
        }

        atualizarNav(totalPaginas);
    }

    /* ══════════════════════════════
       3. PAGINAÇÃO
    ══════════════════════════════ */
    function calcularTotalPaginas() {
        let cfg         = CONFIG_TIPO[binderAtual.tipo];
        let slotsPorPag = cfg.cols * cfg.rows;
        let totalBlocos = Math.ceil(cfg.totalSlots / slotsPorPag);
        return Math.ceil(totalBlocos / 2) + 1;
    }

    function atualizarNav(totalPaginas) {
        let paginaExibida = paginaAtual + 1;
        document.getElementById("nav-info").textContent = paginaExibida;
        document.getElementById("btn-prev").disabled    = (paginaAtual === 0);
        document.getElementById("btn-next").disabled    = (paginaAtual >= totalPaginas - 1);
    }

    function navegarPagina(direcao) {
        let totalPaginas = calcularTotalPaginas();
        paginaAtual      = paginaAtual + direcao;
        if (paginaAtual < 0)             paginaAtual = 0;
        if (paginaAtual >= totalPaginas) paginaAtual = totalPaginas - 1;
        renderizarPagina();
    }

    /* ══════════════════════════════
       4. MODAL DE IMAGEM AMPLIADA
    ══════════════════════════════ */
    function abrirModalImagem(urlImagem) {
        let urlGrande = urlImagem.replace('small', 'large');
        document.getElementById("img_ampliada").src           = urlGrande;
        document.getElementById("modal_imagem").style.display = "flex";
    }

    function fecharModalImagem() {
        document.getElementById("modal_imagem").style.display = "none";
        setTimeout(function() {
            document.getElementById("img_ampliada").src = "";
        }, 200);
    }

    document.getElementById("modal_imagem").addEventListener("click", function(e) {
        if (e.target === this) fecharModalImagem();
    });

    /* ══════════════════════════════
       5. EVENT LISTENERS
    ══════════════════════════════ */
    document.addEventListener("keydown", function(e) {
        let modalAberto = document.getElementById("modal_imagem").style.display === "flex";

        if (e.key === "Escape" && modalAberto) {
            fecharModalImagem();
            return;
        }

        if (!modalAberto) {
            if (e.key === "ArrowLeft"  && !document.getElementById("btn-prev").disabled) navegarPagina(-1);
            if (e.key === "ArrowRight" && !document.getElementById("btn-next").disabled) navegarPagina(1);
        }
    });

    window.addEventListener('resize', function() {
        renderizarPagina();
    });

    /* ══════════════════════════════
       START
    ══════════════════════════════ */
    carregarBinderPublico();
</script>
