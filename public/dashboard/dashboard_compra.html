<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pkmnHub | Compra</title>
    <link rel="icon" href="../assets/imgs/main/logo.png">
    <link rel="stylesheet" href="../css/style_dashboard.css">
</head>

<body>
    <aside class="sidebar">
        <div class="logo">
            <a href="../index.html"><img src="../assets/imgs/main/logo2.png">pkmnHub</a>
        </div>

        <nav class="nav-menu">
            <ul>
                <li class="nav-item"><a href="../index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="dashboard_colecao.html" class="nav-link">Coleção</a></li>
                <li class="nav-item"><a href="dashboard_business.html" class="nav-link">Business</a></li>
                <li class="nav-item nav-item-has-submenu" id="cadastroMenu">
                    <a class="nav-link active">Cadastro</a>
                    <ul class="submenu active">
                        <li><a href="dashboard_compra.html" class="submenu-link active">Compra</a></li>
                        <li><a href="dashboard_venda.html" class="submenu-link">Venda</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </aside>

    <div class="main-container">
        <header id="header">
            <span style="font-weight: 100;">hey! <span style="font-weight: 900;" id="username"></span></span>
        </header>

        <div class="cadastroFlex_wrapper">
            <main class="cadastroContainer">
                <section class="formularioCadastro">
                    <div class="welcome-text">
                        <h1>Cadastre sua <span class="ballet" style="color: #F9CF30;">Aquisição</span></h1>
                        <p>Preencha a numeração da sua carta</p>
                    </div>

                    <form>
                        <div class="inputsJuntos">
                            <div class="espaco">
                                <label for="ipt_numero">Número</label>
                                <input type="text" id="ipt_numero" placeholder="Ex: 054/191"
                                    oninput="validandoImagem(ipt_numero.value, ipt_set.value)">
                            </div>

                            <div class="espaco">
                                <label style="color: transparent;">.</label>
                                <button type="button" onclick="limparFormulario()" class="btnLimpar">LIMPAR</button>
                            </div>
                        </div>

                        <div class="carta-info-divider" style="margin-bottom: 15px;"></div>

                        <label>SELECIONE O TIPO</label>
                        <div class="tipoSelector">
                            <label class="tipoItem"><input type="radio" name="n_tipo" value="Grass"><img
                                    src="../assets/imgs/types/grass.png"></label>
                            <label class="tipoItem"><input type="radio" name="n_tipo" value="Fire"><img
                                    src="../assets/imgs/types/fire.png"></label>
                            <label class="tipoItem"><input type="radio" name="n_tipo" value="Water"><img
                                    src="../assets/imgs/types/water.png"></label>
                            <label class="tipoItem"><input type="radio" name="n_tipo" value="Lightning"><img
                                    src="../assets/imgs/types/lightning.png"></label>
                            <label class="tipoItem"><input type="radio" name="n_tipo" value="Psychic"><img
                                    src="../assets/imgs/types/psychic.png"></label>
                            <label class="tipoItem"><input type="radio" name="n_tipo" value="Fighting"><img
                                    src="../assets/imgs/types/fightning.png"></label>
                            <label class="tipoItem"><input type="radio" name="n_tipo" value="Darkness"><img
                                    src="../assets/imgs/types/darkness.png"></label>
                            <label class="tipoItem"><input type="radio" name="n_tipo" value="Metal"><img
                                    src="../assets/imgs/types/metal.png"></label>
                            <label class="tipoItem"><input type="radio" name="n_tipo" value="Dragon"><img
                                    src="../assets/imgs/types/dragon.png"></label>
                            <label class="tipoItem"><input type="radio" name="n_tipo" value="Colorless"><img
                                    src="../assets/imgs/types/colorless.png"></label>
                            <label class="tipoItem"><input type="radio" name="n_tipo" value="Fairy"><img
                                    src="../assets/imgs/types/fairy.png"></label>
                            <label class="tipoItem"><input type="radio" name="n_tipo" value=null><img
                                    src="../assets/imgs/types/none.png"></label>
                        </div>

                        <label>SELECIONE A RARIDADE</label>
                        <div class="raridadeSelector">
                            <label class="raridadeItem"><input type="radio" name="n_raridade" value="Common"><img
                                    src="../assets/imgs/raritys/common.png"></label>
                            <label class="raridadeItem"><input type="radio" name="n_raridade" value="Uncommon"><img
                                    src="../assets/imgs/raritys/uncommon.png"></label>
                            <label class="raridadeItem"><input type="radio" name="n_raridade" value="Rare"><img
                                    src="../assets/imgs/raritys/rare.png"></label>
                            <label class="raridadeItem"><input type="radio" name="n_raridade" value="Double Rare"><img
                                    src="../assets/imgs/raritys/double-rare.png"></label>
                            <label class="raridadeItem"><input type="radio" name="n_raridade" value="Ultra Rare"><img
                                    src="../assets/imgs/raritys/ultra-rare.png"></label>
                            <label class="raridadeItem"><input type="radio" name="n_raridade"
                                    value="Illustration Rare"><img
                                    src="../assets/imgs/raritys/illustration-rare.png"></label>
                            <label class="raridadeItem"><input type="radio" name="n_raridade"
                                    value="Special Illustration Rare"><img
                                    src="../assets/imgs/raritys/special-illustration-rare.png"></label>
                            <label class="raridadeItem"><input type="radio" name="n_raridade" value="ACE SPEC Rare"><img
                                    src="../assets/imgs/raritys/ace-spec-rare.png"></label>
                            <label class="raridadeItem"><input type="radio" name="n_raridade"
                                    value="Mega Hyper Rare"><img src="../assets/imgs/raritys/hyper-rare.png"></label>
                            <label class="raridadeItem"><input type="radio" name="n_raridade" value="Promo"><img
                                    src="../assets/imgs/raritys/promo.png"></label>
                        </div>

                        <div class="inputsJuntos">
                            <div class="espaco">
                                <label for="ipt_nome">Nome da Carta</label>
                                <input type="text" id="ipt_nome" placeholder="Ex: Charizard ex">
                            </div>

                            <div class="espaco">
                                <label for="ipt_set" id="label_set">Expansão (Set)</label>
                                <input type="text" id="ipt_set" placeholder="Ex: Heróis Excelsos"
                                    oninput="validandoImagem(ipt_numero.value, ipt_set.value)">
                            </div>
                        </div>

                        <div class="inputsJuntos">
                            <div class="espaco">
                                <label for="ipt_qtd">QNT.</label>
                                <input type="number" id="ipt_qtd" min="1" value="1">
                            </div>

                            <div class="espaco">
                                <label for="ipt_preco">VALOR DE COMPRA (R$)</label>
                                <input type="number" id="ipt_valorCompra" value="0" min="0" step="1.00"
                                    placeholder="0.00">
                            </div>

                            <div class="espaco">
                                <label for="ipt_precoLiga">MENOR DA LIGA (R$)</label>
                                <input type="number" id="ipt_precoLiga" value="0" min="0" step="1.00"
                                    placeholder="0.00">
                            </div>

                            <!-- <div class="espaco">
                                <label for="ipt_url">URL IMAGEM</label>
                                <input type="url" id="ipt_url" placeholder="https://images.pokemontcg.io/...">
                            </div> -->
                        </div>

                        <label id="div_validacao"></label>

                        <button type="button" onclick="cadastrarCarta()" class="btnPrincipal_sign">Finalizar
                            Cadastro</button>


                    </form>
                </section>

                <section class="direitaContainer_gyarados" style="align-items: center;">
                    <img src="https://images.scrydex.com/pokemon/1-1/large" alt="" id="imagem"
                        style="width: 75%; opacity: 0;">
                    <div class="card"
                        style="margin-top: 10px; flex: 0; min-height: fit-content; border-color: #F9CF30; background-color: #1214176e; backdrop-filter: blur(10px);;">
                        <div class="total-number" style="font-size: 15px; margin-bottom: 10px;" id="roi">INSTRUÇÕES!
                        </div>
                        <div class="label">Preencha somente o campo de numeração e valores, caso seja necessário será
                            solicitado outros campos.</div>
                    </div>
                </section>
            </main>
        </div>
    </div>
</body>

</html>

<script src="../js/dados.js"></script>
<script src="../js/dadosCartas.js"></script>
<script src="../js/functions.js"></script>

<script>
    // ----- TESTANDO UMA IMPLEMENTAÇÃO MUITO LOKA: -----
    let expansaoFinal = '';

    function limparFormulario() {
        ipt_nome.value = "";
        ipt_set.value = "";
        ipt_numero.value = "";
        ipt_qtd.value = 1;
        ipt_valorCompra.value = 0;
        ipt_precoLiga.value = 0;

        let img = document.getElementById('imagem');
            img.style.opacity = '0';

        document.querySelectorAll('input[name="n_tipo"]').forEach(r => r.checked = false);
        document.querySelectorAll('input[name="n_raridade"]').forEach(r => r.checked = false);
    }

    // ----- VARIAVEIS INPUTS: -----
    function cadastrarCarta() {
        let nomeCarta = ipt_nome.value;
        let setCarta = expansaoFinal;
        let numeroCarta = ipt_numero.value;
        let qntCarta = Number(ipt_qtd.value);
        let valorCompra = Number(ipt_valorCompra.value);
        let menorLiga = Number(ipt_precoLiga.value);
        let imagemCarta = imagem.src;

        let tipoCarta = document.querySelector('input[name="n_tipo"]:checked')?.value;
        let raridadeCarta = document.querySelector('input[name="n_raridade"]:checked')?.value;

        let usuario = sessionStorage.getItem("ID_USER");

        let nomeValidado = true;

        // ----- VALIDAÇÕES: -----
        if (tipoCarta !== 'null') {
            nomeValidado = false;
            console.log("situação 1: " + nomeValidado);
            for (let i = 0; i < todosPokemons.length; i++) {
                if ((nomeCarta.toLowerCase()).includes(todosPokemons[i])) {
                    nomeValidado = true;
                    console.log("situação 2 entrou no if: " + nomeValidado);
                    break;
                }
            }
        }

        let condicoesErro = [
            nomeCarta == "" || setCarta == "" || numeroCarta == "" || qntCarta == "" || imagemCarta == "",
            nomeCarta.length < 3 || !nomeValidado,
            (raridadeCarta != 'Promo' && (numeroCarta.indexOf('/') != 3 || numeroCarta.length != 7)),
            tipoCarta == undefined,
            raridadeCarta == undefined
        ];

        let mensagensErro = [
            "Preencha todos os campos",
            "Nome inválido",
            "Observe a parte inferior da sua carta e preencha corretamente a númeração",
            "Selecione o tipo da carta",
            "Selecione a raridade da carta"
        ];

        for (let i = 0; i < condicoesErro.length; i++) {
            if (condicoesErro[i]) {
                div_validacao.innerHTML = "<span style='color: #EE3D2D'>" + mensagensErro[i] + "</span>";
                return false;
            }
        }


        console.log("valorCompra enviado:", valorCompra);
        console.log("menorLiga enviado:", menorLiga);
        // ----- IMPLEMENTAÇÃO API: -----
        fetch("/cards/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                nomeCartaServer: nomeCarta,
                setCartaServer: setCarta,
                numeroCartaServer: numeroCarta,
                qntCartaServer: qntCarta,
                valorCompraServer: valorCompra,
                menorLigaServer: menorLiga,
                imagemCartaServer: imagemCarta,
                tipoCartaServer: tipoCarta,
                raridadeCartaServer: raridadeCarta,
                usuarioServer: usuario
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);
                if (resposta.ok) {
                    div_validacao.innerHTML = "<span style='color: #2ecc71'>Carta cadastrada com sucesso!</span>";
                } else {
                    div_validacao.innerHTML = "<span style='color: #EE3D2D'>Houve um erro ao tentar realizar o cadastro...</span>";;
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });

        return false;
    }
</script>
