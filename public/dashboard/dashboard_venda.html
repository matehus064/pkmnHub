<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pkmnHub | Venda</title>
    <link rel="icon" href="../assets/imgs/main/logo.png">
    <link rel="stylesheet" href="../css/style_dashboard.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <a href="../index.html"><img src="../assets/imgs/main/logo2.png">pkmnHub</a>
        </div>

        <nav class="nav-menu">
            <ul>
                <li class="nav-item"><a href="../index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="dashboard_colecao.html" class="nav-link">Coleção</a></li>
                <li class="nav-item"><a href="dashboard_business.html" class="nav-link">Business</a></li>
                <li class="nav-item nav-item-has-submenu" id="cadastroMenu">
                    <a class="nav-link active">Cadastro</a>
                    <ul class="submenu active">
                        <li><a href="dashboard_compra.html" class="submenu-link">Compra</a></li>
                        <li><a href="dashboard_venda.html" class="submenu-link active">Venda</a></li>
                        <li><a href="dashboard_troca.html" class="submenu-link">Troca</a></li>
                        <li><a href="#" class="submenu-link">Atualização</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </aside>

    <div class="main-container">
        <header id="header">
            <span style="font-weight: 100;">hey! <span style="font-weight: 900;" id="username"></span ></span>
        </header>

        <div class="cadastroFlex_wrapper">
            <main class="cadastroContainer">
                <section class="formularioCadastro">
                    <div class="welcome-text">
                        <h1>Cadastre sua <span class="ballet" style="color: #F9CF30;">Venda</span></h1>
                        <p>Preencha os dados técnicos e financeiros.</p>
                    </div>

                    <form>
                        <div class="inputsJuntos">
                            <div class="espaco">
                                <label for="ipt_nome">Nome da Carta</label>
                                <input type="text" id="ipt_nome" placeholder="Ex: Charizard ex">
                            </div>

                            <div class="espaco">
                                <label for="ipt_numero">NÚMERO</label>
                                <input type="text" id="ipt_numero" placeholder="Ex: 054/191">
                            </div>
                        </div>

                        <div class="inputsJuntos">
                            <div class="espaco">
                                <label for="ipt_qtd">QNT.</label>
                                <input type="number" id="ipt_qtd" min="1" value="1">
                            </div>

                            <div class="espaco">
                                <label for="ipt_preco">VALOR DE VENDA (R$)</label>
                                <input type="number" id="ipt_valorVenda" value="0" min="1" step="1.00" placeholder="0.00">
                            </div>

                            <div class="espaco">
                                <label for="ipt_precoLiga">MENOR DA LIGA (R$)</label>
                                <input type="number" id="ipt_precoLiga" value="0" min="1" step="1.00"
                                    placeholder="0.00">
                            </div>
                        </div>

                        <label id="div_validacao"></label>

                        <button type="button" onclick="cadastrarCartaVenda()" class="btnPrincipal_sign">Finalizar Cadastro</button>
                    </form>
                </section>

                <section class="direitaContainer_nidoking"></section>
            </main>
        </div>
    </div>
</body>
</html>

<script src="../js/dados.js"></script>
<script src="../js/functions.js"></script>

<script>
    // ----- VARIAVEIS INPUTS: -----
    function cadastrarCartaVenda() {
        let nomeCarta = ipt_nome.value;
        let numeroCarta = ipt_numero.value;
        let qntCarta = Number(ipt_qtd.value);
        let valorVenda = Number(ipt_valorVenda.value);
        let menorLiga = Number(ipt_precoLiga.value);

        let usuario = sessionStorage.getItem("ID_USER");

        let nomeValidado = true;

    // ----- VALIDAÇÕES: -----

        let condicoesErro = [
            nomeCarta == "" || numeroCarta == "" || qntCarta == "",
            nomeCarta.length < 3 || !nomeValidado,
            numeroCarta.indexOf('/') != 3 || numeroCarta.length != 7
        ];

        let mensagensErro = [
            "Preencha todos os campos",
            "Nome inválido",
            "Observe a parte inferior da sua carta e preencha corretamente a númeração"
        ];

        for (let i = 0; i < condicoesErro.length; i++) {
            if (condicoesErro[i]) {
                div_validacao.innerHTML = "<span style='color: #EE3D2D'>" + mensagensErro[i] + "</span>";
                return false;
            }
        }
        div_validacao.innerHTML = "<span style='color: #2ecc71'>Venda concluída! Carta retirada da coleção</span>";

        // ----- IMPLEMENTAÇÃO API: -----
        fetch("/transacoes/venda", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                nomeCartaServer: nomeCarta,
                numeroCartaServer: numeroCarta,
                qntCartaServer: qntCarta,
                valorVendaServer: valorVenda,
                menorLigaServer: menorLiga,
                usuarioServer: usuario
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);
                if (resposta.ok) {
                    div_validacao.innerHTML = "<span style='color: #2ecc71'>Carta vendida com sucesso!</span>";
                } else {
                    div_validacao.innerHTML = "<span style='color: #EE3D2D'>Houve um erro ao tentar realizar a venda...</span>";;
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });

        return false;
    }
</script>
