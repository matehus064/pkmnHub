<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pkmnHub | Binders</title>
    <link rel="icon" href="../assets/imgs/main/logo.png">
    <link rel="stylesheet" href="../css/style_dashboard.css">
</head>

<body onload="buscarBinders()">
    <aside class="sidebar">
        <div class="logo">
            <a href="../index.html"><img src="../assets/imgs/main/logo2.png">pkmnHub</a>
        </div>

        <nav class="nav-menu">
            <ul>
                <li class="nav-item"><a href="../index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="dashboard_colecao.html" class="nav-link">Coleção</a></li>
                <li class="nav-item"><a href="dashboard_business.html" class="nav-link">Business</a></li>
                <li class="nav-item nav-item-has-submenu" id="cadastroMenu">
                    <a class="nav-link active">Cadastro</a>
                    <ul class="submenu active">
                        <li><a href="dashboard_compra.html" class="submenu-link active">Compra</a></li>
                        <li><a href="dashboard_venda.html" class="submenu-link">Venda</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </aside>

    <div class="main-container main-container--binders">
        <header id="header">
            <span class="header-saudacao">hey! <span class="header-saudacao-nome" id="username"></span></span>
        </header>

        <div class="cadastroFlex_wrapper cadastroFlex_wrapper--binders">
            <main class="cadastroContainer cadastroContainer--binders">
                <div id="lista_binders" class="binder-grid"></div>
            </main>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal_criar" class="modal-backdrop" style="display: none;">
        <div class="modal-box">
            <button class="modal-close" onclick="fecharModal()">✕</button>
            <h2>Criar novo binder</h2>
            <p>Organize sua coleção em um binder personalizado</p>

            <div class="modal-field">
                <label>Nome do binder</label>
                <input type="text" id="ipt_nomeBinder" placeholder="Ex: Meus Lendários">
            </div>

            <div class="modal-field">
                <label>Tipo</label>
                <div class="tipo-grid">
                    <div class="tipo-option">
                        <input type="radio" name="n_tipoBinder" id="t22" value="2x2" checked>
                        <label class="tipo-label" for="t22">
                            <span class="tipo-size">2×2</span>
                            <span class="tipo-sub">160 cartas</span>
                        </label>
                    </div>
                    <div class="tipo-option">
                        <input type="radio" name="n_tipoBinder" id="t33" value="3x3">
                        <label class="tipo-label" for="t33">
                            <span class="tipo-size">3×3</span>
                            <span class="tipo-sub">360 cartas</span>
                        </label>
                    </div>
                    <div class="tipo-option">
                        <input type="radio" name="n_tipoBinder" id="t43" value="4x3">
                        <label class="tipo-label" for="t43">
                            <span class="tipo-size">4×3</span>
                            <span class="tipo-sub">480 cartas</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button class="modal-btn-cancel" onclick="fecharModal()">Cancelar</button>
                <button class="btnPrincipal_sign btnPrincipal_sign--flex" onclick="criarBinder()">Criar binder</button>
            </div>
        </div>
    </div>
</body>

</html>

<script src="../js/dados.js"></script>
<script src="../js/dadosCartas.js"></script>
<script src="../js/functions.js"></script>

<script>
    function abrirBinder(idBinder, nomeBinder, tipoBinder) {
        sessionStorage.setItem('BINDER_ID', idBinder);
        sessionStorage.setItem('BINDER_NOME', nomeBinder);
        sessionStorage.setItem('BINDER_TIPO', tipoBinder);
        window.location.href = 'dashboard_binder_view.html';
    }

    function buscarBinders() {
        let usuario = sessionStorage.getItem("ID_USER");

        fetch(`/binder/buscarBinders?usuarioServer=${usuario}`)
            .then(function (resposta) {
                return resposta.json();
            })
            .then(function (json) {
                let grid = document.getElementById("lista_binders");
                grid.innerHTML = '';

                json.forEach(function (binder) {
                    grid.innerHTML += `
                        <div class="binder-card">
                            <div class="binder-cover-wrapper">
                                <img class="binder-cover" src="../assets/imgs/binders/binder_${binder.tipo}.png" alt="${binder.nome}">
                            </div>
                            <div class="binder-body">
                                <div>
                                    <div class="binder-name">${binder.nome}</div>
                                    <div class="binder-meta">
                                        <span class="binder-badge">${binder.tipo}</span>
                                    </div>
                                </div>
                                <div class="binder-actions">
                                    <button class="btn-edit" onclick="abrirBinder(${binder.id}, '${binder.nome}', '${binder.tipo}')">Abrir</button>
                                    <button class="btn-del" onclick="apagarBinder(${binder.id})">🗑</button>
                                </div>
                            </div>
                        </div>
                    `;
                });

                grid.innerHTML += `
                    <div class="binder-card-add" onclick="abrirModal()">
                        <div class="add-icon">+</div>
                        <span class="add-label">Novo binder</span>
                    </div>
                `;
            })
            .catch(function (erro) {
                console.log(erro);
            });
    }

    function abrirModal() {
        document.getElementById("ipt_nomeBinder").value = '';
        document.getElementById("t22").checked = true;
        document.getElementById("modal_criar").style.display = "flex";
    }

    function fecharModal() {
        document.getElementById("modal_criar").style.display = "none";
    }

    document.getElementById("modal_criar").addEventListener("click", function (e) {
        if (e.target === this) fecharModal();
    });

    document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") fecharModal();
    });

    function criarBinder() {
        let nomeBinder = ipt_nomeBinder.value;
        let tipoBinder = document.querySelector('input[name="n_tipoBinder"]:checked')?.value;
        let usuario = sessionStorage.getItem("ID_USER");

        fetch("/binder/criarBinder", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                nomeBinderServer: nomeBinder,
                tipoBinderServer: tipoBinder,
                usuarioServer: usuario
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);
                if (resposta.ok) {
                    fecharModal();
                    buscarBinders();
                } else {
                    console.log("Erro ao criar binder!");
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });

        return false;
    }

    function apagarBinder(idBinder) {
        let confirmacao = confirm("Tem certeza que deseja apagar este binder? Essa ação não pode ser desfeita.");
        if (!confirmacao) return;

        fetch("/binder/deletarBinder", {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ idBinderServer: idBinder })
        })
            .then(function (resposta) {
                if (resposta.ok) {
                    window.location.reload();
                } else {
                    console.error("Erro na API ao deletar o binder.");
                    alert("Houve um erro ao tentar apagar o binder. Tente novamente.");
                }
            })
            .catch(function (erro) {
                console.error("Erro no fetch apagarBinder:", erro);
                alert("Erro de conexão com o servidor.");
            });
    }
</script>
