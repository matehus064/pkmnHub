<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pkmnHub | Binders</title>
    <link rel="icon" href="../assets/imgs/main/logo.png">
    <link rel="stylesheet" href="../css/style_dashboard.css">
</head>


<style>
    /* ========== CORREÇÃO DE SCROLL ========== */
    .main-container {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: 30px 40px;
    }

    .main-container>header {
        flex-shrink: 0;
    }

    .cadastroFlex_wrapper {
        flex: 1;
        overflow: hidden;
        display: flex;
        min-height: 0;
    }

    .cadastroContainer {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        display: block;
    }

    /* ========== MODAL ========== */
    .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }

    .modal-box {
        background: var(--bg-card);
        border: 1px solid var(--border-dark);
        border-radius: 20px;
        padding: 36px;
        width: 100%;
        max-width: 420px;
        position: relative;
        animation: modalEntrar 0.2s ease;
    }

    @keyframes modalEntrar {
        from {
            opacity: 0;
            transform: scale(0.96) translateY(8px);
        }

        to {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    }

    .modal-close {
        position: absolute;
        top: 18px;
        right: 20px;
        background: none;
        border: none;
        color: var(--text-gray);
        font-size: 20px;
        cursor: pointer;
        transition: color 0.2s;
    }

    .modal-close:hover {
        color: white;
    }

    .modal-box h2 {
        font-size: 20px;
        font-weight: 800;
        margin-bottom: 4px;
    }

    .modal-box>p {
        color: var(--text-gray);
        font-size: 13px;
        margin-bottom: 22px;
    }

    .modal-field {
        margin-bottom: 16px;
    }

    .tipo-grid {
        display: flex;
        gap: 8px;
    }

    .tipo-option {
        flex: 1;
    }

    .tipo-option input {
        display: none;
    }

    .tipo-label {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 10px 6px;
        background: var(--bg-body);
        border: 1px solid #2a2d32;
        border-radius: 10px;
        cursor: pointer;
        transition: border-color 0.2s, color 0.2s;
        font-size: 11px;
        font-weight: 700;
        color: var(--text-gray);
        text-align: center;
    }

    .tipo-size {
        font-size: 16px;
        font-weight: 800;
        color: white;
    }

    .tipo-sub {
        font-size: 10px;
        color: var(--text-gray);
    }

    .tipo-option input:checked+.tipo-label {
        border-color: var(--accent-yellow);
        color: var(--accent-yellow);
    }

    .tipo-option input:checked+.tipo-label .tipo-size,
    .tipo-option input:checked+.tipo-label .tipo-sub {
        color: var(--accent-yellow);
    }

    .modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 24px;
        align-items: center;
    }

    .modal-btn-cancel {
        background: transparent;
        color: var(--text-gray);
        border: 1px solid var(--border-dark);
        border-radius: 50px;
        padding: 13px 20px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        transition: color 0.2s, border-color 0.2s;
        font-family: 'Manrope', sans-serif;
    }

    .modal-btn-cancel:hover {
        color: white;
        border-color: var(--text-gray);
    }

    .modal-box input {
        width: 100%;
        background: #121417;
        border: 1px solid #2a2d32;
        padding: 10px 14px;
        border-radius: 8px;
        color: white;
        outline: none;
        font-family: 'Manrope', sans-serif;
        font-size: 14px;
        transition: border-color 0.2s;
    }

    .modal-box input:focus {
        border-color: var(--accent-yellow);
    }

    .modal-box label {
        display: block;
        font-size: 10px;
        font-weight: 800;
        color: var(--text-gray);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* ========== GRID DE BINDERS ========== */
    .binder-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        width: 100%;
        align-content: start;
    }

    .binder-card {
        background: #121417;
        border: 1px solid var(--border-dark);
        border-radius: 18px;
        overflow: hidden;
        display: flex;
        flex-direction: row;
        height: 170px;
    }

    .binder-cover-wrapper {
        width: 140px;
        height: 170px;
        flex-shrink: 0;
        background: linear-gradient(to right, #1a1c1f, #121417);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .binder-cover {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        display: block;
    }

    .binder-body {
        padding: 16px 18px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        flex: 1;
        min-width: 0;
    }

    .binder-name {
        font-size: 16px;
        font-weight: 800;
        color: white;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .binder-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 5px;
    }

    .binder-badge {
        font-size: 10px;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 20px;
        background: #2a2d32;
        color: var(--text-gray);
    }

    .binder-badge.pub {
        background: rgba(249, 207, 48, 0.12);
        color: var(--accent-yellow);
    }

    .binder-actions {
        display: flex;
        gap: 8px;
    }

    .btn-edit {
        flex: 1;
        background: var(--accent-yellow);
        color: #000;
        border: none;
        border-radius: 8px;
        padding: 9px 0;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
        font-family: 'Manrope', sans-serif;
        transition: opacity 0.2s;
    }

    .btn-edit:hover {
        opacity: 0.85;
    }

    .btn-del {
        width: 36px;
        height: 36px;
        background: #2a2d32;
        border: none;
        border-radius: 8px;
        color: var(--text-gray);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        flex-shrink: 0;
        transition: background 0.2s, color 0.2s;
        font-family: 'Manrope', sans-serif;
    }

    .btn-del:hover {
        background: rgba(238, 61, 45, 0.15);
        color: var(--danger);
    }

    /* ========== CARD DE ADICIONAR ========== */
    .binder-card-add {
        background: var(--bg-card);
        border: 2px dashed var(--border-dark);
        border-radius: 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        height: 170px;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
    }

    .binder-card-add:hover {
        border-color: var(--accent-yellow);
        background: #1e1f22;
    }

    .add-icon {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #2a2d32;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: var(--text-gray);
        transition: background 0.2s, color 0.2s;
    }

    .binder-card-add:hover .add-icon {
        background: rgba(249, 207, 48, 0.15);
        color: var(--accent-yellow);
    }

    .add-label {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-gray);
        transition: color 0.2s;
    }

    .binder-card-add:hover .add-label {
        color: var(--accent-yellow);
    }
</style>

<body onload="buscarBinders()">
    <aside class="sidebar">
        <div class="logo">
            <a href="../index.html"><img src="../assets/imgs/main/logo2.png">pkmnHub</a>
        </div>

        <nav class="nav-menu">
            <ul>
                <li class="nav-item"><a href="../index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="dashboard_colecao.html" class="nav-link">Coleção</a></li>
                <li class="nav-item"><a href="dashboard_business.html" class="nav-link">Business</a></li>
                <li class="nav-item nav-item-has-submenu" id="cadastroMenu">
                    <a class="nav-link active">Cadastro</a>
                    <ul class="submenu active">
                        <li><a href="dashboard_compra.html" class="submenu-link active">Compra</a></li>
                        <li><a href="dashboard_venda.html" class="submenu-link">Venda</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </aside>

    <div class="main-container">
        <header id="header">
            <span style="font-weight: 100;">hey! <span style="font-weight: 900;" id="username"></span></span>
        </header>

        <div class="cadastroFlex_wrapper">
            <main class="cadastroContainer">
                <div id="lista_binders" class="binder-grid"></div>
            </main>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal_criar" class="modal-backdrop" style="display: none;">
        <div class="modal-box">
            <button class="modal-close" onclick="fecharModal()">✕</button>
            <h2>Criar novo binder</h2>
            <p>Organize sua coleção em um binder personalizado</p>

            <div class="modal-field">
                <label>Nome do binder</label>
                <input type="text" id="ipt_nomeBinder" placeholder="Ex: Meus Lendários">
            </div>

            <div class="modal-field">
                <label>Tipo</label>
                <div class="tipo-grid">
                    <div class="tipo-option">
                        <input type="radio" name="n_tipoBinder" id="t22" value="2x2" checked>
                        <label class="tipo-label" for="t22">
                            <span class="tipo-size">2×2</span>
                            <span class="tipo-sub">160 cartas</span>
                        </label>
                    </div>
                    <div class="tipo-option">
                        <input type="radio" name="n_tipoBinder" id="t33" value="3x3">
                        <label class="tipo-label" for="t33">
                            <span class="tipo-size">3×3</span>
                            <span class="tipo-sub">360 cartas</span>
                        </label>
                    </div>
                    <div class="tipo-option">
                        <input type="radio" name="n_tipoBinder" id="t43" value="4x3">
                        <label class="tipo-label" for="t43">
                            <span class="tipo-size">4×3</span>
                            <span class="tipo-sub">480 cartas</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button class="modal-btn-cancel" onclick="fecharModal()">Cancelar</button>
                <button class="btnPrincipal_sign" style="flex:1; margin-top:0;" onclick="criarBinder()">Criar
                    binder</button>
            </div>
        </div>
    </div>
</body>

</html>

<script src="../js/dados.js"></script>
<script src="../js/dadosCartas.js"></script>
<script src="../js/functions.js"></script>

<script>
function abrirBinder(idBinder, nomeBinder, tipoBinder) {
    // Salva os 3 dados no sessionStorage
    sessionStorage.setItem('BINDER_ID', idBinder);
    sessionStorage.setItem('BINDER_NOME', nomeBinder);
    sessionStorage.setItem('BINDER_TIPO', tipoBinder);

    // Redireciona para a página de visualização que acabamos de montar
    window.location.href = 'dashboard_binder_view.html'; // ajuste o nome do seu arquivo HTML se for diferente
}

    function buscarBinders() {
        let usuario = sessionStorage.getItem("ID_USER");

        fetch(`/binder/buscarBinders?usuarioServer=${usuario}`)
            .then(function (resposta) {
                return resposta.json();
            })
            .then(function (json) {
                let grid = document.getElementById("lista_binders");
                grid.innerHTML = '';

                json.forEach(function (binder) {
                    grid.innerHTML += `
        <div class="binder-card">
            <div class="binder-cover-wrapper">
                <img class="binder-cover" src="../assets/imgs/binders/binder_${binder.tipo}.png" alt="${binder.nome}">
            </div>
            <div class="binder-body">
                <div>
                    <div class="binder-name">${binder.nome}</div>
                    <div class="binder-meta">
                        <span class="binder-badge">${binder.tipo}</span>
                    </div>
                </div>
                <div class="binder-actions">
                    <button class="btn-edit" onclick="abrirBinder(${binder.id}, '${binder.nome}', '${binder.tipo}')">Abrir</button>
                    <button class="btn-del" onclick="apagarBinder(${binder.id})">🗑</button>
                </div>
            </div>
        </div>
    `;
                });

                // Card de adicionar sempre no final
                grid.innerHTML += `
                <div class="binder-card-add" onclick="abrirModal()">
                    <div class="add-icon">+</div>
                    <span class="add-label">Novo binder</span>
                </div>
            `;
            })
            .catch(function (erro) {
                console.log(erro);
            });
    }


    /* ── Modal ── */
    function abrirModal() {
        document.getElementById("ipt_nomeBinder").value = '';
        document.getElementById("t22").checked = true;
        document.getElementById("modal_criar").style.display = "flex";
    }

    function fecharModal() {
        document.getElementById("modal_criar").style.display = "none";
    }

    document.getElementById("modal_criar").addEventListener("click", function (e) {
        if (e.target === this) fecharModal();
    });

    document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") fecharModal();
    });

    // ----- Criar Binder -----

    function criarBinder() {
        let nomeBinder = ipt_nomeBinder.value
        let tipoBinder = document.querySelector('input[name="n_tipoBinder"]:checked')?.value;
        let usuario = sessionStorage.getItem("ID_USER");


        fetch("/binder/criarBinder", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                nomeBinderServer: nomeBinder,
                tipoBinderServer: tipoBinder,
                usuarioServer: usuario
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);
                if (resposta.ok) {
                    fecharModal();
                    buscarBinders(); // recarrega a lista
                } else {
                    console.log("Erro ao criar binder!");
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });

        return false;
    }

    function apagarBinder(idBinder) {
    // 1. Pede confirmação antes de fazer a requisição
    let confirmacao = confirm("Tem certeza que deseja apagar este binder? Essa ação não pode ser desfeita.");

    if (!confirmacao) {
        return; // Se o usuário clicar em "Cancelar", a função para por aqui
    }

    // 2. Dispara o fetch com o método DELETE
    fetch("/binder/deletarBinder", {
        method: "DELETE",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            idBinderServer: idBinder
        })
    })
        .then(function (resposta) {
            if (resposta.ok) {
                console.log("Binder apagado com sucesso!");
                
                // 3. Atualiza a tela. 
                // Você pode chamar a sua função que busca os binders novamente, por exemplo:
                // buscarBindersUsuario(); 
                
                // Ou, o jeito mais simples, apenas recarregar a página:
                window.location.reload();
            } else {
                console.error("Erro na API ao deletar o binder.");
                alert("Houve um erro ao tentar apagar o binder. Tente novamente.");
            }
        })
        .catch(function (erro) {
            console.error("Erro no fetch apagarBinder:", erro);
            alert("Erro de conexão com o servidor.");
        });
}
</script>
