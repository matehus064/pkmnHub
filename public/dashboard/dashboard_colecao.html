<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pkmnHub | Coleção</title>
    <link rel="icon" href="../assets/imgs/main/logo.png">
    <link rel="stylesheet" href="../css/style_dashboard.css">
</head>

<style>
    /* ----- GRID DE COLEÇÃO ----- */
    .grid-colecao {
        display: flex;
        flex-wrap: wrap;
        gap: 25px;
        padding: 20px;
        overflow-y: auto;
        height: calc(100vh - 100px);
        align-content: flex-start;
        justify-content: center;
    }

    /* ----- CARD DA CARTA ----- */
    .carta-card {
        width: calc(25% - 25px);
        position: relative;
        cursor: pointer;
        overflow: hidden;
        isolation: isolate;
        transform: translateZ(0);
        transition: scale 0.2s ease;
        border-radius: 15px;
    }

    .carta-card:hover {
        scale: 1.02;
    }

    /* ----- IMAGEM DA CARTA ----- */
    .carta-grid-img {
        width: 100%;
        object-fit: cover;
        border-radius: 15px;
        border: 2px solid rgba(249, 205, 48, 0.24);
        display: block;
    }

    /* ----- BANDEJA DE INFORMAÇÕES ----- */
    .carta-hover-info {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(26, 28, 31, 0.88);
        border-radius: 15px;
        backdrop-filter: blur(4px);
        padding: 20px 15px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
        z-index: 10;
        box-sizing: border-box;
    }

    .carta-hover-info.visivel {
        opacity: 1;
    }

    /* ----- TEXTOS DA BANDEJA ----- */
    .carta-info-nome {
        font-size: 22px;
        font-weight: 800;
        color: white;
        line-height: 1.2;
    }

    .carta-info-set {
        color: var(--accent-yellow);
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 4px;
    }

    .carta-info-numero {
        color: var(--text-gray);
        font-size: 11px;
        font-weight: 600;
        margin-bottom: 8px;
    }

    .carta-info-divider {
        width: 100%;
        height: 2px;
        background: var(--accent-yellow);
    }

    .carta-info-linha {
        font-size: 12px;
        color: var(--text-gray);
        display: flex;
        justify-content: space-between;
    }

    .carta-info-linha strong {
        color: white;
        font-weight: 700;
    }

    /* ----- MAIN CONTAINER ----- */
    .main-container-colecao {
        overflow: hidden;
    }
</style>

<body onload="colecao()">
    <aside class="sidebar">
        <div class="logo">
            <a href="../index.html"><img src="../assets/imgs/main/logo2.png">pkmnHub</a>
        </div>

        <nav class="nav-menu">
            <ul>
                <li class="nav-item"><a href="../index.html" class="nav-link">Home</a></li>
                <li class="nav-item active"><a href="dashboard_colecao.html" class="nav-link">Coleção</a></li>
                <li class="nav-item"><a href="dashboard_business.html" class="nav-link">Business</a></li>
                <li class="nav-item nav-item-has-submenu" id="cadastroMenu">
                    <a class="nav-link">Cadastro</a>
                    <ul class="submenu">
                        <li><a href="dashboard_compra.html" class="submenu-link">Compra</a></li>
                        <li><a href="dashboard_venda.html" class="submenu-link">Venda</a></li>
                        <li><a href="dashboard_troca.html" class="submenu-link">Troca</a></li>
                        <li><a href="#" class="submenu-link">Atualização</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </aside>

    <div class="main-container main-container-colecao">
        <header id="header">
            <span style="font-weight: 100;">hey! <span style="font-weight: 900;" id="username"></span></span>
        </header>

        <div id="grid_colecao" class="grid-colecao"></div>
    </div>

</body>

</html>

<script src="../js/dados.js"></script>
<script src="../js/functions.js"></script>

<script>
    function colecao() {
        let usuario = sessionStorage.getItem("ID_USER");

        fetch(`/cards/buscarColecao?usuarioServer=${usuario}`)
            .then(function (resposta) {
                return resposta.json();
            })
            .then(function (json) {
                json.forEach(carta => {
                    grid_colecao.innerHTML += `
                        <div class="carta-card" onclick="toggleInfo(this)">
                            <img src="${carta.url_imagem}" class="carta-grid-img">
                            <div class="carta-hover-info">
                                <span class="carta-info-nome">${carta.nome_pokemon}</span>
                                <span class="carta-info-set">${carta.set_nome}</span>
                                <span class="carta-info-numero"># ${carta.numero_set}</span>
                                <div class="carta-info-divider"></div>
                                <div class="carta-info-linha">
                                    <span>Quantidade</span>
                                    <strong>${carta.quantidade}</strong>
                                </div>
                                <div class="carta-info-linha">
                                    <span>Valor Pago</span>
                                    <strong>${formatarBrl(carta.preco_compra)}</strong>
                                </div>
                                <div class="carta-info-linha">
                                    <span>Valor Real</span>
                                    <strong>${formatarBrl(carta.preco_ligaPkmn)}</strong>
                                </div>
                            </div>
                        </div>
                    `;
                });
            })
            .catch(function (erro) {
                console.log(erro);
            });
    }

    function toggleInfo(card) {
        let info = card.querySelector('.carta-hover-info');
        let isVisible = info.classList.contains('visivel');

        document.querySelectorAll('.carta-hover-info').forEach(i => i.classList.remove('visivel'));

        if (!isVisible) {
            info.classList.add('visivel');
        }
    }

    document.addEventListener('DOMContentLoaded', function () {
        const cadastroMenu = document.getElementById('cadastroMenu');
        const linkCadastro = cadastroMenu.querySelector('.nav-link');
        linkCadastro.addEventListener('click', function (e) {
            e.preventDefault();
            cadastroMenu.classList.toggle('open');
        });
    });
</script>
