<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pkmnHub | Login</title>
    <link rel="icon" href="./assets/imgs/main/logo.png">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="bodyCadastro">
    <main class="cadastroContainer">
        <section class="esquerdaContainer">
            <div class="direitaConteudo">
                <div class="detalheCadastro">
                    <span class="detalheCadastro01">ACESSO ILIMITADO</span>
                    <span class="detalheCadastro02">GESTÃO PREMIUM</span>
                </div>
                <h2>Domine o jogo, <span class="destaqueTexto">Colecione</span> lendas!</h2>

                <div class="footerDireita">
                    <div class="footerDireita_item">
                        <strong>1k+</strong>
                        <p>POKÉMONS</p>
                    </div>
                    <div class="divider"></div>
                    <div class="footerDireita_item">
                        <strong>TODAS</strong>
                        <p>AS SUAS CARTAS</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="formularioCadastro">
            <div class="logo">
                <a href="index.html">
                    <img src="./assets/imgs/main/logo.png">pkmnHub</a>
            </div>

            <div class="welcome-text">
                <h1>Continue sua Jornada</h1>
                <p>Seus Pokémons estão a espera!</p>
            </div>

            <form onsubmit="return false;">
                <label>E-MAIL</label>
                <input type="text" id="ipt_email" placeholder="nome@exemplo.com">

                <label>SENHA</label>
                <input type="password" id="ipt_senha" placeholder="********">

                <label id="div_validacao"></label>

                <button type="submit" class="btnPrincipal_sign" onclick="login()">Entrar</button>
            </form>

            <p class="linkCadastro">Não possui uma conta? <a href="cadastro.html">Cadastre-se</a></p>
        </section>
    </main>
</body>

</html>

<script>
    function login() {
        // ----- VARIAVEIS INPUTS: -----
        let email = ipt_email.value;
        let senha = ipt_senha.value;

        // ----- VALIDAÇÃO: -----
        if (email == "" || senha == "") {
            div_validacao.innerHTML = '<span style="color: #EE3D2D">Preencha todos os campos para começar sua jornada!</span>';
            return false;
        }

        // ----- IMPLEMENTAÇÃO API: -----
        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: email,
                senhaServer: senha
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USER = json.usernameServer;
                    sessionStorage.USERNAME = json.usernameServer;
                    sessionStorage.ID_USER = json.id;
                    sessionStorage.PROFILE_PIC = json.numFotoPerfilServer;

                    setTimeout(function () {
                        window.location = "./dashboard/dashboard_business.html";
                    }, 1000);

                });
            } else {
                console.log("Houve um erro ao tentar realizar o login!");
                resposta.text().then(texto => {
                    console.error(texto);
                    div_validacao.innerHTML = "<span style='color: #EE3D2D'>Houve um erro ao tentar realizar o login...</span>";;
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }
</script>
