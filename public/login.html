<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pkmnHub | Login</title>
    <link rel="icon" href="./assets/imgs/main/logo.png">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bodyCadastro">
    <main class="cadastroContainer">
        <section class="esquerdaContainer">
            <div class="direitaConteudo">
                <div class="detalheCadastro">
                    <span class="detalheCadastro01">ACESSO ILIMITADO</span>
                    <span class="detalheCadastro02">GESTÃO PREMIUM</span>
                </div>
                <h2>Domine o jogo, <span class="destaqueTexto">Colecione</span> lendas!</h2>

                <div class="footerDireita">
                    <div class="footerDireita_item">
                        <strong>1k+</strong>
                        <p>POKÉMONS</p>
                    </div>
                    <div class="divider"></div>
                    <div class="footerDireita_item">
                        <strong>TODAS</strong>
                        <p>AS SUAS CARTAS</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="formularioCadastro">
            <div class="logo">
                <a href="index.html">
                    <img src="./assets/imgs/main/logo.png">pkmnHub</a>
            </div>

            <div class="welcome-text">
                <h1>Continue sua Jornada</h1>
                <p>Seus Pokémons estão a espera!</p>
            </div>

            <form>
                <label>E-MAIL</label>
                <input type="email" placeholder="nome@exemplo.com">

                <div class="espaco"> <label>SENHA</label>
                    <input type="password" placeholder="********">
                </div>

                <button type="submit" class="btnPrincipal_sign">Entrar</button>
            </form>

            <p class="linkCadastro">Não possui uma conta? <a href="cadastro.html">Cadastre-se</a></p>
        </section>
    </main>
</body>

</html>
