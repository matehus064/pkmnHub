<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pkmnHub | Cadastro</title>
    <link rel="icon" href="./assets/imgs/main/logo.png">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bodyCadastro2">
    <main class="cadastroContainer">
        <section class="formularioCadastro">
            <div class="logo">
                <a href="index.html">
                    <img src="./assets/imgs/main/logo.png">pkmnHub</a>
            </div>

            <div class="welcome-text">
                <h1>Comece sua Jornada</h1>
                <p>Escolha seu inicial!</p>
            </div>

            <form>
                <label>USERNAME</label>
                <input type="text" placeholder="Ex: Red1996">

                <label>E-MAIL</label>
                <input type="email" placeholder="nome@exemplo.com">

                <div class="inputsJuntos">
                    <div class="espaco">
                        <label>SENHA</label>
                        <input type="password" placeholder="********">
                    </div>
                    <div class="espaco">
                        <label>CONFIRMAR SENHA</label>
                        <input type="password" placeholder="********">
                    </div>
                </div>

                <label class="labelRadio">ESCOLHA SUA FOTO DE PERFIL</label>
                <div class="fotoPerfil-selector">
                    <label class="fotoPerfil-item"><input type="radio" name="n_fotoPerfil" value="1"><img src="./assets/imgs/profilePics/1.webp"></label>
                    <label class="fotoPerfil-item"><input type="radio" name="n_fotoPerfil" value="2"><img src="./assets/imgs/profilePics/2.webp"></label>
                    <label class="fotoPerfil-item"><input type="radio" name="n_fotoPerfil" value="3"><img src="./assets/imgs/profilePics/3.webp"></label>
                    <label class="fotoPerfil-item"><input type="radio" name="n_fotoPerfil" value="4"><img src="./assets/imgs/profilePics/4.webp"></label>
                    <label class="fotoPerfil-item"><input type="radio" name="n_fotoPerfil" value="5"><img src="./assets/imgs/profilePics/5.webp"></label>
                    <label class="fotoPerfil-item"><input type="radio" name="n_fotoPerfil" value="6"><img src="./assets/imgs/profilePics/6.webp"></label>
                </div>

                <button type="submit" class="btnPrincipal_sign">Cadastrar</button>
            </form>

            <p class="linkCadastro">Já possui uma conta? <a href="login.html">Entrar</a></p>
        </section>

        <section class="direitaContainer">
            <div class="direitaConteudo">
                <div class="detalheCadastro">
                    <span class="detalheCadastro01">ACESSO ILIMITADO</span>
                    <span class="detalheCadastro02">GESTÃO PREMIUM</span>
                </div>
                <h2>Domine o jogo, <span class="destaqueTexto">Colecione</span> lendas!</h2>

                <div class="footerDireita">
                    <div class="footerDireita_item">
                        <strong>1k+</strong>
                        <p>POKÉMONS</p>
                    </div>
                    <div class="divider"></div>
                    <div class="footerDireita_item">
                        <strong>TODAS</strong>
                        <p>AS SUAS CARTAS</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>

<script>
        let nome = ipt_nome.value;
    let dataNasc = ipt_dataNasc.value;
    let cpf = ipt_cpf.value;
    let email = ipt_email.value;
    let senha = ipt_senha.value;
    let confirmacaoSenha = ipt_confirmacaoSenha.value;
    let confirmacaoCode = ipt_confirmacaoCodigo.value;

    let condicoesErro = [
        nome == "" || cpf == "" || email == "" || senha == "" || confirmacaoSenha == "",
        nome == "" || nome.length <= 3,
        dataNasc == "",
        cpf.length != 11,
        !email.includes("@"),
        senha.length < 6,
        confirmacaoSenha != senha,
        confirmacaoCode == "" || confirmacaoCode.length < 5
    ];

    let mensagensErro = [
        "Todos campos são obrigatórios",
        "Nome inválido",
        "Preencha a data de nascimento",
        "CPF deve ter 11 dígitos",
        "E-mail deve conter @",
        "Senha muito curta (mínimo 6)",
        "Senhas não coincidem",
        "Insira o Código de ativação válido"
    ];



</script>
